<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 3D Track Visualization - Circuit Zandvoort</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050505;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
        }

        .circuit-name {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E10600 0%, #3671C6 50%, #00D2BE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(225, 6, 0, 0.3);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #A0A0A0;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
        }

        .legend-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #A0A0A0;
            margin-bottom: 12px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 24px;
            height: 6px;
            border-radius: 3px;
            margin-right: 12px;
        }

        .legend-color.danger { background: #FF3333; box-shadow: 0 0 10px #FF3333; }
        .legend-color.sharp { background: #FFD700; box-shadow: 0 0 10px #FFD700; }
        .legend-color.normal { background: #00D2BE; box-shadow: 0 0 10px #00D2BE; }

        .controls-info {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
            color: #A0A0A0;
            pointer-events: auto;
        }

        .controls-info span {
            color: #00D2BE;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #E10600;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1rem;
            color: #A0A0A0;
        }

        .data-source {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            color: #666;
            pointer-events: auto;
        }

        .turn-label {
            position: absolute;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            transform: translate(-50%, -50%);
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            white-space: nowrap;
        }

        .turn-label.turn {
            color: #FFD700;
        }

        .turn-label.danger {
            color: #FF3333;
        }

        .start-label {
            position: absolute;
            padding: 4px 12px;
            background: linear-gradient(135deg, #00D2BE, #3671C6);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div class="overlay">
            <div class="header">
                <div class="circuit-name">CIRCUIT ZANDVOORT</div>
                <div class="subtitle">Formula 1 Dutch Grand Prix</div>
            </div>

            <div class="data-source" id="data-source">Data: Loading...</div>

            <div class="legend">
                <div class="legend-title">Turn Classification</div>
                <div class="legend-item">
                    <div class="legend-color danger"></div>
                    <span>Danger Zone (&gt;0.6 rad)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color sharp"></div>
                    <span>Sharp Turn (&gt;0.3 rad)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color normal"></div>
                    <span>Normal Track</span>
                </div>
            </div>

            <div class="controls-info">
                <span>Drag</span> to rotate | <span>Scroll</span> to zoom | <span>Right-click</span> to pan
            </div>

            <div id="labels-container"></div>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">Loading track data...</div>
            </div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const OVERPASS_API = 'https://overpass-api.de/api/interpreter';

        async function fetchTrackData() {
            const query = `
                [out:json][timeout:25];
                (
                    way["name"="Circuit Zandvoort"](52.38,4.52,52.40,4.57);
                    way["name"="Zandvoort"](52.38,4.52,52.40,4.57);
                    relation["name"="Circuit Zandvoort"](52.38,4.52,52.40,4.57);
                );
                out body;
                >;
                out skel qt;
            `;

            try {
                const response = await fetch(OVERPASS_API, {
                    method: 'POST',
                    body: `data=${encodeURIComponent(query)}`
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                return parseOSMData(data);
            } catch (error) {
                console.error('Overpass API error:', error);
                return getFallbackTrackData();
            }
        }

        function parseOSMData(data) {
            const nodes = new Map();
            const ways = [];

            for (const element of data.elements) {
                if (element.type === 'node' && element.lat && element.lon) {
                    nodes.set(element.id, [element.lat, element.lon]);
                } else if (element.type === 'way' && element.nodes) {
                    ways.push(element.nodes);
                }
            }

            const allPoints = [];
            for (const wayNodes of ways) {
                for (const nodeId of wayNodes) {
                    if (nodes.has(nodeId)) {
                        allPoints.push(nodes.get(nodeId));
                    }
                }
            }

            if (allPoints.length < 10) {
                return getFallbackTrackData();
            }

            const sortedPoints = sortTrackPoints(allPoints);
            return sortedPoints;
        }

        function sortTrackPoints(points) {
            if (points.length < 2) return points;

            const sorted = [points[0]];
            const remaining = new Set(points.slice(1).map((p, i) => i + 1));

            let current = points[0];
            while (remaining.size > 0) {
                let minDist = Infinity;
                let minIdx = -1;
                let minPoint = null;

                for (const idx of remaining) {
                    const point = points[idx];
                    const dist = haversineDistance(current, point);
                    if (dist < minDist) {
                        minDist = dist;
                        minIdx = idx;
                        minPoint = point;
                    }
                }

                if (minPoint && minDist < 0.01) {
                    sorted.push(minPoint);
                    remaining.delete(minIdx);
                    current = minPoint;
                } else {
                    break;
                }
            }

            return sorted;
        }

        function haversineDistance(p1, p2) {
            const R = 6371;
            const dLat = (p2[0] - p1[0]) * Math.PI / 180;
            const dLon = (p2[1] - p1[1]) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(p1[0] * Math.PI / 180) * Math.cos(p2[0] * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function getFallbackTrackData() {
            const centerLat = 52.3888;
            const centerLon = 4.5409;

            const points = [];
            const numPoints = 200;

            for (let i = 0; i < numPoints; i++) {
                const t = (i / numPoints) * 2 * Math.PI;

                let lat = centerLat;
                let lon = centerLon;

                lat += Math.sin(t) * 0.008 + Math.sin(t * 3) * 0.002;
                lon += Math.cos(t) * 0.012 + Math.cos(t * 2) * 0.003;

                if (t > Math.PI * 0.2 && t < Math.PI * 0.5) {
                    lat += 0.003;
                }
                if (t > Math.PI * 1.1 && t < Math.PI * 1.4) {
                    lon -= 0.002;
                }

                points.push([lat, lon]);
            }

            document.getElementById('data-source').textContent = 'Data: Simulated (OpenStreetMap unavailable)';
            return points;
        }

        function convertTo3D(points) {
            const centerLat = 52.3888;
            const centerLon = 4.5409;
            const scale = 10000;

            return points.map(([lat, lon]) => {
                return new THREE.Vector3(
                    (lon - centerLon) * scale,
                    0,
                    (lat - centerLat) * scale
                );
            });
        }

        function detectTurns(points3D) {
            const turns = [];
            const segments = [];

            const dangerThreshold = 0.6;
            const sharpThreshold = 0.3;

            for (let i = 1; i < points3D.length - 1; i++) {
                const v1 = new THREE.Vector3().subVectors(points3D[i], points3D[i-1]).normalize();
                const v2 = new THREE.Vector3().subVectors(points3D[i+1], points3D[i]).normalize();
                const angle = v1.angleTo(v2);

                let classification = 'normal';
                let color = new THREE.Color(0x00D2BE);

                if (angle > dangerThreshold) {
                    classification = 'danger';
                    color = new THREE.Color(0xFF3333);
                } else if (angle > sharpThreshold) {
                    classification = 'sharp';
                    color = new THREE.Color(0xFFD700);
                }

                if (classification !== 'normal') {
                    turns.push({
                        index: i,
                        point: points3D[i],
                        angle: angle,
                        classification: classification
                    });
                }

                segments.push({
                    start: points3D[i],
                    end: points3D[i + 1] || points3D[0],
                    color: color,
                    classification: classification
                });
            }

            return { turns, segments };
        }

        function createTrackSegments(segments, trackCurve) {
            const group = new THREE.Group();
            const tubeRadius = 1.5;
            const radialSegments = 8;

            const tubeGeometry = new THREE.TubeGeometry(
                trackCurve,
                segments.length * 4,
                tubeRadius,
                radialSegments,
                false
            );

            const positions = tubeGeometry.attributes.position;
            const colors = new Float32Array(positions.count * 3);

            const pointsOnCurve = [];
            const numCurvePoints = segments.length * 4;
            for (let i = 0; i <= numCurvePoints; i++) {
                const t = i / numCurvePoints;
                pointsOnCurve.push(trackCurve.getPoint(t));
            }

            for (let i = 0; i < positions.count; i++) {
                const point = new THREE.Vector3(
                    positions.getX(i),
                    positions.getY(i),
                    positions.getZ(i)
                );

                let minDist = Infinity;
                let closestSegIdx = 0;
                let closestParam = 0;

                for (let j = 0; j < pointsOnCurve.length - 1; j++) {
                    const p1 = pointsOnCurve[j];
                    const p2 = pointsOnCurve[j + 1];
                    const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);

                    const dist = point.distanceTo(mid);
                    if (dist < minDist) {
                        minDist = dist;
                        closestSegIdx = Math.floor(j / 4);
                        closestParam = j / pointsOnCurve.length;
                    }
                }

                const segIdx = Math.min(closestSegIdx, segments.length - 1);
                const segment = segments[segIdx];

                colors[i * 3] = segment.color.r;
                colors[i * 3 + 1] = segment.color.g;
                colors[i * 3 + 2] = segment.color.b;
            }

            tubeGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.3,
                metalness: 0.7,
                emissive: new THREE.Color(0x000000),
                emissiveIntensity: 0.5
            });

            const track = new THREE.Mesh(tubeGeometry, material);
            group.add(track);

            const glowMaterial = new THREE.MeshBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.3,
                side: THREE.BackSide
            });

            const glowGeometry = new THREE.TubeGeometry(
                trackCurve,
                segments.length * 4,
                tubeRadius * 1.8,
                radialSegments,
                false
            );

            glowGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            group.add(glow);

            return group;
        }

        function createStartFinishLine(points3D) {
            const start = points3D[0];
            const next = points3D[1] || points3D[0];
            const direction = new THREE.Vector3().subVectors(next, start).normalize();
            const perpendicular = new THREE.Vector3(-direction.z, 0, direction.x);

            const lineGeometry = new THREE.BoxGeometry(8, 0.5, 1);
            const lineMaterial = new THREE.MeshStandardMaterial({
                color: 0xFFFFFF,
                emissive: 0xFFFFFF,
                emissiveIntensity: 2
            });

            const line = new THREE.Mesh(lineGeometry, lineMaterial);
            line.position.copy(start);
            line.position.y = 1;
            line.rotation.y = Math.atan2(direction.x, direction.z);

            return line;
        }

        function createTurnMarkers(turns, points3D) {
            const markers = new THREE.Group();

            const dangerMarkers = turns.filter(t => t.classification === 'danger').slice(0, 3);
            const sharpMarkers = turns.filter(t => t.classification === 'sharp').slice(0, 5);

            const allMarkers = [
                ...dangerMarkers.map(t => ({ ...t, type: 'danger' })),
                ...sharpMarkers.map(t => ({ ...t, type: 'sharp' }))
            ].slice(0, 8);

            const markerGeometry = new THREE.SphereGeometry(1.5, 16, 16);

            allMarkers.forEach((turn, idx) => {
                const color = turn.type === 'danger' ? 0xFF3333 : 0xFFD700;
                const markerMaterial = new THREE.MeshStandardMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 1.5,
                    transparent: true,
                    opacity: 0.8
                });

                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.copy(turn.point);
                marker.position.y = 2;
                marker.userData = { turn: idx + 1, type: turn.type, angle: turn.angle };

                markers.add(marker);
            });

            return markers;
        }

        function createGround() {
            const groundGeometry = new THREE.CircleGeometry(500, 64);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,
                roughness: 0.9,
                metalness: 0.1
            });

            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;

            return ground;
        }

        function createGrid() {
            const gridHelper = new THREE.GridHelper(400, 40, 0x1a1a1a, 0x111111);
            gridHelper.position.y = -0.4;
            return gridHelper;
        }

        function createLabels(points3D, turns) {
            const labels = [];

            const startLabel = document.createElement('div');
            startLabel.className = 'start-label';
            startLabel.textContent = 'START/FINISH';
            const startObject = new CSS2DObject(startLabel);
            startObject.position.copy(points3D[0]);
            startObject.position.y = 8;
            labels.push(startObject);

            const numberedTurns = turns.slice(0, 6);
            numberedTurns.forEach((turn, idx) => {
                const labelDiv = document.createElement('div');
                labelDiv.className = `turn-label ${turn.classification}`;
                labelDiv.textContent = `TURN ${idx + 1}`;
                const labelObj = new CSS2DObject(labelDiv);
                labelObj.position.copy(turn.point);
                labelObj.position.y = 10;
                labels.push(labelObj);
            });

            return labels;
        }

        async function initScene() {
            const container = document.getElementById('canvas-container');
            const loading = document.getElementById('loading');

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 100, 500);

            const camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                2000
            );
            camera.position.set(0, 120, 200);
            camera.lookAt(0, 0, 0);

            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                powerPreference: 'high-performance'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1;
            container.appendChild(renderer.domElement);

            const labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0';
            labelRenderer.domElement.style.pointerEvents = 'none';
            container.appendChild(labelRenderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 50;
            controls.maxDistance = 500;
            controls.maxPolarAngle = Math.PI / 2.2;
            controls.target.set(0, 0, 0);

            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xE10600, 2, 300);
            pointLight1.position.set(50, 100, 50);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x3671C6, 1.5, 300);
            pointLight2.position.set(-50, 80, -50);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0x00D2BE, 1, 200);
            pointLight3.position.set(0, 60, 0);
            scene.add(pointLight3);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(100, 150, 100);
            scene.add(directionalLight);

            const trackPoints = await fetchTrackData();
            document.getElementById('data-source').textContent =
                `Data: OpenStreetMap (${trackPoints.length} points)`;

            const points3D = convertTo3D(trackPoints);

            let centerX = 0, centerZ = 0;
            points3D.forEach(p => { centerX += p.x; centerZ += p.z; });
            centerX /= points3D.length;
            centerZ /= points3D.length;

            points3D.forEach(p => {
                p.x -= centerX;
                p.z -= centerZ;
            });

            const trackCurve = new THREE.CatmullRomCurve3(points3D, true, 'catmullrom', 0.5);

            const { turns, segments } = detectTurns(trackCurve.getPoints(points3D.length * 2));

            const trackGroup = createTrackSegments(segments, trackCurve);
            scene.add(trackGroup);

            const startLine = createStartFinishLine(points3D);
            scene.add(startLine);

            const turnMarkers = createTurnMarkers(turns, points3D);
            scene.add(turnMarkers);

            const ground = createGround();
            scene.add(ground);

            const grid = createGrid();
            scene.add(grid);

            const labels = createLabels(points3D, turns);
            labels.forEach(label => scene.add(label));

            const composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5,
                0.4,
                0.85
            );
            composer.addPass(bloomPass);

            loading.style.display = 'none';

            let autoRotate = true;

            function animate() {
                requestAnimationFrame(animate);

                if (autoRotate) {
                    scene.rotation.y += 0.002;
                }

                controls.update();
                composer.render();
                labelRenderer.render(scene, camera);
            }

            controls.addEventListener('start', () => { autoRotate = false; });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                labelRenderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        initScene().catch(console.error);
    </script>
</body>
</html>
